<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Портал объектов · ГИП</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f5f7; --surface:#ffffff; --surface-2:#f8f9fb;
    --line:#e6e8ec; --line-2:#d7dade;
    --text:#1a1d23; --muted:#6b7280; --hint:#9aa1ab;
    --accent:#2f5fe0; --accent-soft:#eaf0fe;
    --green:#1d9e75; --green-bg:#e1f5ee;
    --amber:#c07b14; --amber-bg:#faeeda;
    --blue:#185fa5; --blue-bg:#e6f1fb;
    --red:#c0392b; --red-bg:#fcebeb;
    --purple:#6a4bbd; --purple-bg:#eeeafe;
    --gray:#7a8088; --gray-bg:#eef0f2;
    --radius:14px; --radius-sm:10px;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none;cursor:pointer}
  .wrap{max-width:1200px;margin:0 auto;padding:18px 22px 80px}
  .brandstrip{height:8px;background:linear-gradient(135deg,#0a1224 0%,#1a2742 40%,#2d4a7d 70%,#1a2742 100%)}
  .lg-brand-img{display:block;margin:0 auto 14px;max-width:200px;max-height:74px;background:#1c1e26;border-radius:10px;padding:10px 14px}
  input,select,button{font-family:inherit}

  /* ===== login ===== */
  .login{min-height:90vh;display:flex;align-items:center;justify-content:center}
  .login .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:34px 32px;width:360px;text-align:center}
  .login .logo{width:52px;height:52px;border-radius:14px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:23px;margin:0 auto 16px}
  .login h1{font-size:20px;font-weight:800}
  .login p{font-size:13px;color:var(--muted);margin:4px 0 22px}
  .login input{width:100%;font-size:14.5px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:11px;outline:none}
  .login input:focus{border-color:var(--accent);background:#fff}
  .login button{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14.5px;font-weight:700;cursor:pointer;margin-top:4px}
  .login .err{color:var(--red);font-size:13px;min-height:18px;margin-top:8px;font-weight:600}
  .login .hint{font-size:12px;color:var(--hint);margin-top:14px}

  /* ===== header ===== */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer}
  .brand .logo{width:38px;height:38px;border-radius:11px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px}
  .brand-logo{height:46px;width:auto;display:block;background:#1c1e26;border-radius:10px;padding:6px 10px;flex-shrink:0}
  .brand-sep{display:inline-block;width:1px;height:34px;background:var(--line-2);flex-shrink:0}
  .brand h1{font-size:18px;font-weight:800;letter-spacing:-.2px}
  .brand p{font-size:12px;color:var(--muted);margin-top:1px}
  .usermenu{display:flex;align-items:center;gap:14px}
  .sync{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .sync .dot{width:8px;height:8px;border-radius:50%;background:var(--hint)}
  .sync .dot.ok{background:var(--green)} .sync .dot.err{background:var(--red)}
  .who{text-align:right}
  .who .n{font-size:13.5px;font-weight:700}
  .who .r{font-size:11.5px;color:var(--muted)}
  .rolebadge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:7px;text-transform:uppercase;letter-spacing:.3px}
  .role-admin{color:var(--purple);background:var(--purple-bg)}
  .role-director{color:var(--blue);background:var(--blue-bg)}
  .role-gip{color:var(--green);background:var(--green-bg)}
  .nav{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
  .nav a{font-size:13.5px;font-weight:600;color:var(--muted);padding:8px 14px;border-radius:9px;border:1px solid transparent}
  .nav a.active{color:var(--accent);background:var(--accent-soft)}
  .nav a:hover{color:var(--accent)}

  .btn{font-size:13px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--line-2);border-radius:9px;padding:9px 14px;cursor:pointer}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.pri:hover{color:#fff;filter:brightness(1.05)}
  .btn.sm{padding:6px 10px;font-size:12px}
  .btn.danger:hover{border-color:var(--red);color:var(--red)}

  .ro-banner{background:var(--blue-bg);border:1px solid #cfe0f3;color:var(--blue);font-size:12.5px;font-weight:600;padding:9px 14px;border-radius:10px;margin-bottom:14px}

  /* passport */
  .passport{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 22px;margin-bottom:16px}
  .ptitle{display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .ptitle i{color:var(--accent);font-style:normal;font-weight:800}
  .ptitle span{font-size:15px;font-weight:700}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:13px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field.wide{grid-column:1/-1}
  .field label{font-size:11.5px;color:var(--hint);text-transform:uppercase;letter-spacing:.3px;font-weight:600}
  .field input,.field select{font-size:14px;font-weight:500;color:var(--text);background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;outline:none}
  .field input:focus,.field select:focus{border-color:var(--accent);background:#fff}
  .field input::placeholder{color:var(--hint);font-weight:400}
  .field input:disabled,.field select:disabled{color:var(--muted);background:#f2f3f5;cursor:not-allowed}

  .tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tab{font-size:14px;font-weight:600;color:var(--muted);background:none;border:none;padding:11px 15px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab .cnt{font-size:11.5px;color:var(--hint);font-weight:600;margin-left:5px}

  .hero{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px}
  .hero .top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .hero h2{font-size:17px;font-weight:800;display:flex;align-items:center;gap:9px}
  .hero h2 .tag{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:3px 9px;border-radius:7px;text-transform:uppercase;letter-spacing:.4px}
  .hero .big{font-size:38px;font-weight:800;letter-spacing:-1px;line-height:1}
  .hero .big small{font-size:18px;color:var(--hint)}
  .hero .sub{font-size:13px;color:var(--muted);margin-top:3px}
  .bar{height:9px;border-radius:6px;background:var(--gray-bg);margin-top:14px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:6px;background:var(--green);transition:width .3s}
  .bar.thin{height:6px;margin-top:10px}

  .dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:14px}
  .dcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:15px 17px}
  .dcard .k{font-size:12px;color:var(--muted);font-weight:600}
  .dcard .v{font-size:24px;font-weight:800;margin-top:4px;letter-spacing:-.5px}

  .flow{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--hint);font-size:12.5px;font-weight:600;margin:10px 0 12px}
  .flow .ln{flex:1;height:1px;background:var(--line)}
  .blocked{background:var(--red-bg);border:1px solid #f2cfcf;border-radius:var(--radius-sm);padding:13px 16px;margin-bottom:14px}
  .blocked .h{font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:#8a2d22;background:#fff;border:1px solid #f2cfcf;border-radius:8px;padding:5px 10px 5px 6px;margin:0 7px 7px 0}
  .chip b{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--red);background:var(--red-bg);padding:2px 6px;border-radius:6px}
  .ok-note{font-size:13px;color:var(--green);font-weight:600;background:var(--green-bg);border-radius:var(--radius-sm);padding:11px 16px;margin-bottom:14px}

  .grouplabel{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:16px 4px 9px}
  .colhead{display:grid;gap:12px;padding:2px 14px 8px;font-size:11px;color:var(--hint);text-transform:uppercase;letter-spacing:.3px;font-weight:600}
  .colhead.sec{grid-template-columns:48px 1fr 150px 124px 124px 158px}
  .colhead.ird{grid-template-columns:1fr 150px 120px 150px 150px}

  .row{display:grid;gap:12px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px 14px;margin-bottom:7px}
  .row.sec{grid-template-columns:48px 1fr 150px 124px 124px 158px}
  .row.ird{grid-template-columns:1fr 150px 120px 150px 150px}
  .row:hover{border-color:var(--line-2)}
  .row .num{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 6px}
  .row.r-marka .num{color:var(--accent)}
  .row .title{font-size:13.5px;font-weight:600;letter-spacing:-.1px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tcount{font-size:11px;font-weight:700;color:var(--amber);background:var(--amber-bg);border-radius:20px;padding:2px 8px;cursor:pointer}
  .row input.cell,.row select.cell{font-size:13px;color:var(--text);background:transparent;border:1px solid transparent;border-radius:8px;padding:7px 9px;outline:none;width:100%}
  .row input.cell:hover{border-color:var(--line)}
  .row input.cell:focus{border-color:var(--accent);background:var(--surface-2)}
  .row input.cell::placeholder{color:var(--hint)}
  .row input[type=date]{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .row input:disabled,.row select:disabled{color:var(--muted);cursor:not-allowed;opacity:.8}

  .stsel{font-size:12.5px;font-weight:600;border:1px solid var(--line);border-radius:20px;padding:6px 10px;cursor:pointer;outline:none;width:100%}
  .stsel:disabled{cursor:not-allowed;opacity:.85}
  .b-none{color:var(--gray);background:var(--gray-bg);border-color:var(--gray-bg)}
  .b-work{color:var(--amber);background:var(--amber-bg);border-color:var(--amber-bg)}
  .b-check{color:var(--blue);background:var(--blue-bg);border-color:var(--blue-bg)}
  .b-late{color:var(--red);background:var(--red-bg);border-color:var(--red-bg)}
  .b-done{color:var(--green);background:var(--green-bg);border-color:var(--green-bg)}
  .b-corr{color:var(--purple);background:var(--purple-bg);border-color:var(--purple-bg)}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:4px 0 16px;align-items:center}
  .empty-note{padding:26px 18px;text-align:center;color:var(--hint);font-size:13.5px;line-height:1.6}

  /* tasks */
  .task{display:grid;grid-template-columns:1fr 150px 140px 120px 130px 120px 30px;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px 12px;margin-bottom:7px}
  .task input,.task select{font-size:13px;border:1px solid transparent;border-radius:8px;padding:7px 8px;outline:none;width:100%;background:transparent}
  .task input:hover{border-color:var(--line)} .task input:focus{border-color:var(--accent);background:var(--surface-2)}
  .task input[type=date]{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .task .del{color:var(--hint);cursor:pointer;text-align:center;font-size:16px}
  .task .del:hover{color:var(--red)}
  .colhead.task{grid-template-columns:1fr 150px 140px 120px 130px 120px 30px}
  .pri-low{color:var(--gray);background:var(--gray-bg)} .pri-mid{color:var(--blue);background:var(--blue-bg)}
  .pri-high{color:var(--amber);background:var(--amber-bg)} .pri-crit{color:var(--red);background:var(--red-bg)}
  .tk-new{color:var(--gray);background:var(--gray-bg)} .tk-work{color:var(--amber);background:var(--amber-bg)} .tk-done{color:var(--green);background:var(--green-bg)}
  .tk-check{color:var(--blue);background:var(--blue-bg)} .tk-fix{color:var(--red);background:var(--red-bg)}
  .task select{font-weight:600;border-radius:20px;text-align:center}

  /* inline task panel under a section */
  .secwrap{margin-bottom:7px}
  .secwrap .row.sec{margin-bottom:0}
  .secwrap.open .row.sec{border-color:var(--accent);border-bottom-color:var(--line)}
  .chev-sec{margin-left:auto;color:var(--hint);font-size:11px;transition:transform .15s}
  .secwrap.open .chev-sec{transform:rotate(90deg);color:var(--accent)}
  .taskpanel{background:var(--surface-2);border:1px solid var(--accent);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);padding:11px 14px 13px}
  .taskpanel .ph{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .tk{display:grid;grid-template-columns:1fr 150px 108px 108px 118px 96px 26px;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:6px 10px;margin-bottom:6px}
  .tdate{font-size:11px;color:var(--muted);white-space:nowrap;font-family:var(--mono)}
  .tk2{background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:7px}
  .tk-title{width:100%;font-size:13.5px;font-weight:600;border:1px solid transparent;border-radius:7px;padding:6px 8px;outline:none;background:transparent}
  .tk-title:hover{border-color:var(--line)} .tk-title:focus{border-color:var(--accent);background:var(--surface-2)}
  .tk-meta{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-top:7px}
  .tk-meta select,.tk-meta input{font-size:12px;border:1px solid var(--line);border-radius:7px;padding:5px 7px;outline:none;background:var(--surface)}
  .tk-meta input[type=date]{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .tk-meta select:focus,.tk-meta input:focus{border-color:var(--accent)}
  .tk-from{font-weight:600;color:#3c3489;background:#eeedfe;border-color:#cecbf6}
  .tk-fromname{font-size:12px;font-weight:600;color:#3c3489;background:#eeedfe;border:1px solid #cecbf6;border-radius:7px;padding:5px 9px;white-space:nowrap}
  .tk-poser{font-size:11.5px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:5px 9px;white-space:nowrap}
  .gl-attn{font-size:10.5px;font-weight:700;color:var(--red);background:var(--red-bg);border-radius:6px;padding:1px 6px;margin-left:6px}
  .tk-lbl{font-size:11px;color:var(--hint);font-weight:600;margin-right:-3px}
  .tf-view{display:flex;gap:6px}
  .tf-bar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}
  .tf-bar select{font-size:13px;border:1px solid var(--line-2);border-radius:9px;padding:8px 10px;background:var(--surface);outline:none;min-width:180px}
  .tf-bar select:focus{border-color:var(--accent)}
  .tt-head,.tt-row{display:grid;grid-template-columns:2fr 1.4fr 1.2fr 1.2fr 0.8fr 0.7fr 0.8fr;gap:10px;padding:10px 14px;align-items:center}
  .tt-head{font-size:11px;color:var(--hint);text-transform:uppercase;letter-spacing:.3px;font-weight:700;border-bottom:1px solid var(--line)}
  .tt-row{background:var(--surface);border:1px solid var(--line);border-radius:9px;margin-bottom:6px;cursor:pointer;font-size:13px}
  .tt-row:hover{border-color:var(--accent)}
  .tt-title{font-weight:600}
  .tt-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  @media(max-width:900px){.tt-head{display:none}.tt-row{grid-template-columns:1fr}}
  .tk-meta select.pri-low,.tk-meta select.pri-mid,.tk-meta select.pri-high,.tk-meta select.pri-crit,.tk-meta select.tk-new,.tk-meta select.tk-work,.tk-meta select.tk-done{font-weight:600;border-radius:20px;border:none}
  .tk-meta .del{color:var(--hint);cursor:pointer;font-size:16px;padding:0 4px;margin-left:auto}.tk-meta .del:hover{color:var(--red)}
  .taccept{font-size:11.5px;font-weight:700;color:var(--green);background:var(--green-bg);padding:5px 10px;border-radius:20px;white-space:nowrap}
  .tk-accept{white-space:nowrap}
  .tk-return:hover{border-color:var(--red);color:var(--red)}
  .tinfo{font-size:11.5px;font-weight:600;color:var(--blue);background:var(--blue-bg);padding:5px 10px;border-radius:20px;white-space:nowrap}
  .thist-btn{font-size:11px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);padding:4px 8px;border-radius:20px;cursor:pointer;white-space:nowrap}
  .thist-btn.on{color:var(--accent);border-color:var(--accent)}
  .thist{margin-top:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:9px 12px}
  .thist .he{font-size:12px;color:var(--text);padding:3px 0;border-bottom:1px solid var(--line)}
  .thist .he:last-child{border-bottom:none}
  .thist .ht{font-family:var(--mono);color:var(--muted)} .thist .hb{color:var(--hint)} .thist .hc{color:var(--blue);font-style:normal}
  .lk-st{font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:20px;white-space:nowrap}
  .disc{margin-top:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
  .msg{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:7px 10px;margin-bottom:6px}
  .msg-h{font-size:11.5px;color:var(--muted)} .msg-h b{color:var(--text);font-weight:600}
  .msg-h .ht{font-family:var(--mono);margin-left:6px}
  .msg-t{font-size:13px;margin-top:3px;white-space:pre-wrap;word-break:break-word}
  .msg-f{margin-top:4px} .msg-f a{font-size:12.5px;font-weight:600;cursor:pointer}
  .disc-form{margin-top:8px}
  .disc-form textarea{width:100%;font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;outline:none;resize:vertical;background:var(--surface)}
  .disc-form textarea:focus{border-color:var(--accent)}
  .disc-actions{display:flex;gap:8px;align-items:center;margin-top:7px;flex-wrap:wrap}
  .filebtn{cursor:pointer}
  .lkact{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .sd-dates{display:flex;align-items:center;flex-wrap:wrap;gap:7px;font-size:12.5px;color:var(--muted);border-top:1px solid var(--line);padding-top:10px;margin-top:4px}
  .sd-dl{font-weight:600;color:var(--text)} .sd-cust{margin-left:14px;color:var(--accent)}
  .sd-dates input{font-family:var(--mono);font-size:12px;border:1px solid var(--line);border-radius:7px;padding:6px 8px;outline:none;background:var(--surface)}
  .sd-dates input:focus{border-color:var(--accent)}
  .glegend{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:0 2px 10px;align-items:center}
  .glegend i{display:inline-block;width:16px;height:10px;border-radius:3px;vertical-align:middle;margin-right:5px}
  .glegend .lg-pod{background:#5dcaa5} .glegend .lg-cust{background:rgba(47,95,224,0.1);border:1.5px dashed #2f5fe0}
  .glegend .lg-q{width:10px;height:10px;transform:rotate(45deg);background:#dd9c3e}
  .tk:last-child{margin-bottom:0}
  .tk input,.tk select{font-size:12.5px;border:1px solid transparent;border-radius:7px;padding:6px 7px;width:100%;outline:none;background:transparent}
  .tk input:hover{border-color:var(--line)} .tk input:focus{border-color:var(--accent);background:#fff}
  .tk input[type=date]{font-family:var(--mono);font-size:11.5px;color:var(--muted)}

function setSync(ok,msg){const d=document.getElementById('syncDot'),t=document.getElementById('syncTxt');if(d)d.className='dot '+(ok?'ok':'err');if(t)t.textContent=msg||'';}

function isEditing(){const a=document.activeElement;return a&&(a.tagName==='INPUT'||a.tagName==='SELECT')&&a.closest('#root');}
const pushT={};
function pushKey(key,data){
  saveLocal();clearTimeout(pushT[key]);
  pushT[key]=setTimeout(()=>{
    fetch(SB_URL+'/rest/v1/storage',{method:'POST',headers:Object.assign({},SB_H,{'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'}),body:JSON.stringify({key:key,value:JSON.stringify(data)})})
    .then(r=>setSync(r.ok,r.ok?'Сохранено ☁':'Ошибка сохранения')).catch(()=>setSync(false,'Нет соединения'));
  },900);
}

function mergeById(remote,local){
  if(!Array.isArray(remote))remote=[];if(!Array.isArray(local))local=[];
  const map={};remote.forEach(x=>{if(x&&x.id)map[x.id]=x;});
  local.forEach(x=>{if(x&&x.id&&!map[x.id])map[x.id]=x;}); // локальные записи, которых нет в облаке, НЕ теряем
  return Object.keys(map).map(k=>map[k]);
}
function fetchRemote(){
  if(isEditing())return;
  Promise.all([
    fetch(SB_URL+'/rest/v1/storage?select=key,value&key=in.(piron_users,piron_objects,piron_backoffice,piron_executors)',{headers:SB_H}).then(r=>r.json()),
    fetch(SB_URL+'/rest/v1/storage?select=key,value&key=like.piron_obj_*',{headers:SB_H}).then(r=>r.json())
  ]).then(function(res){
     const rows=res[0]||[],objrows=res[1]||[];
     let ru,rb,re,legacy;
     if(Array.isArray(rows))rows.forEach(row=>{try{const v=JSON.parse(row.value);if(row.key==='piron_users')ru=v;if(row.key==='piron_objects')legacy=v;if(row.key==='piron_backoffice')rb=v;if(row.key==='piron_executors')re=v;}catch(e){}});
     // объекты: старый общий список как база, отдельные записи перекрывают
     const omap={};const perObjIds=new Set();
     if(Array.isArray(legacy))legacy.forEach(o=>{if(o&&o.id)omap[o.id]=o;});
     if(Array.isArray(objrows))objrows.forEach(row=>{try{const o=JSON.parse(row.value);if(o&&o.id){omap[o.id]=o;perObjIds.add(o.id);}}catch(e){}});
     if(legacy!==undefined||(Array.isArray(objrows)&&objrows.length)){DB.objects=mergeById(Object.keys(omap).map(k=>omap[k]),DB.objects);}
     if(ru!==undefined){DB.users=mergeById(ru,DB.users);if(DB.users.length>(ru.length||0))pushKey('piron_users',DB.users);}

     if(re!==undefined){DB.executors=mergeById(re,DB.executors);if(DB.executors.length>(re.length||0))pushKey('piron_executors',DB.executors);}
     // миграция: у объектов без отдельной записи — создать её
     DB.objects.forEach(o=>{if(o&&o.id&&!perObjIds.has(o.id))pushKey('piron_obj_'+o.id,o);});

   }).catch(()=>setSync(false,'Нет соединения'));

const SESSION_TTL=120000;let hbTimer=null;
const genToken=()=>uid()+uid();
function getSessions(){return fetch(SB_URL+'/rest/v1/storage?select=value&key=eq.piron_sessions',{headers:SB_H}).then(r=>r.json()).then(rows=>{let s={};try{if(rows&&rows[0])s=JSON.parse(rows[0].value)||{};}catch(e){}return s;});}
function doLogin(){
  const lg=document.getElementById('lg-login').value.trim();
  const pw=document.getElementById('lg-pass').value;
  const u=DB.users.find(x=>!x._del&&(x.login||'').trim().toLowerCase()===lg.toLowerCase()&&(x.password||'').trim()===pw.trim());
  if(!u){document.getElementById('lg-err').textContent='Неверный логин или пароль';return;}
  document.getElementById('lg-err').textContent='Проверка сеанса…';
  const myToken=genToken();
  getSessions().then(function(s){
    const cur=s[u.id];
    if(cur&&cur.token&&cur.token!==myToken&&(Date.now()-(cur.ts||0))<SESSION_TTL){
      document.getElementById('lg-err').innerHTML='Эта учётная запись уже открыта на другом устройстве.<br><span style="font-weight:400;color:var(--muted)">Закройте её там (Выйти) или подождите ~2 минуты.</span>';return;
    }
    s[u.id]={token:myToken,ts:Date.now()};pushKey('piron_sessions',s);
    currentUser=u;session.userId=u.id;session.token=myToken;saveLocal();view='portfolio';startHeartbeat();render();
  }).catch(function(){currentUser=u;session.userId=u.id;session.token=myToken;saveLocal();view='portfolio';startHeartbeat();render();});
}
function startHeartbeat(){if(hbTimer)clearInterval(hbTimer);hbTimer=setInterval(heartbeat,30000);}
function heartbeat(){
  if(!currentUser||!session.token)return;
  getSessions().then(function(s){
    const cur=s[currentUser.id];
    if(cur&&cur.token&&cur.token!==session.token&&(Date.now()-(cur.ts||0))<SESSION_TTL){forceLogout();return;}
    s[currentUser.id]={token:session.token,ts:Date.now()};pushKey('piron_sessions',s);
  }).catch(function(){});
}
function forceLogout(){if(hbTimer)clearInterval(hbTimer);alert('Эта учётная запись была открыта на другом устройстве — текущий сеанс завершён.');currentUser=null;session.userId=null;session.token=null;currentObjId=null;view='login';saveLocal();render();}
function logout(){
  if(currentUser&&session.token){getSessions().then(function(s){if(s[currentUser.id]&&s[currentUser.id].token===session.token){delete s[currentUser.id];pushKey('piron_sessions',s);}}).catch(function(){});}
  if(hbTimer)clearInterval(hbTimer);currentUser=null;session.userId=null;session.token=null;currentObjId=null;view='login';saveLocal();render();
}

const ROW_LABEL={},ROW_NAME={},IRD_NAME={};
STAGE_P.forEach(x=>{ROW_LABEL[x.k]=x.n;ROW_NAME[x.k]=x.t;});
STAGE_R.forEach(g=>g.items.forEach(i=>{ROW_LABEL[i.k]=i.m;ROW_NAME[i.k]=i.t;}));
IRD.forEach(g=>g.items.forEach(i=>{IRD_NAME[i.k]=i.t;}));
const ALLK=STAGE_P.map(x=>x.k).concat(STAGE_R.flatMap(g=>g.items.map(i=>i.k)));
/* кастомные подразделы объекта */
function objExtra(o){o=o||O();if(!o)return{P:[],R:[],I:[]};o.extra=o.extra||{};o.extra.P=o.extra.P||[];o.extra.R=o.extra.R||[];o.extra.I=o.extra.I||[];return o.extra;}
function customP(){return objExtra().P;}
function customR(){return objExtra().R;}
function customI(){return objExtra().I;}
function rowLabel(k){if(ROW_LABEL[k]!=null)return ROW_LABEL[k];const o=O();if(o&&o.extra){const f=(o.extra.P||[]).concat(o.extra.R||[]).find(x=>x.k===k);if(f)return f.label||'•';}return k;}
function rowName(k){if(ROW_NAME[k]!=null)return ROW_NAME[k];const o=O();if(o&&o.extra){const f=(o.extra.P||[]).concat(o.extra.R||[]).find(x=>x.k===k);if(f)return f.t||'(подраздел)';}return 'раздел';}
function irdName(k){if(IRD_NAME[k]!=null)return IRD_NAME[k];const o=O();const f=(o&&o.extra&&o.extra.I||[]).find(x=>x.k===k);return f?(f.t||'(ИРД)'):'ИРД';}
function keysP(){return STAGE_P.map(x=>x.k).concat(customP().map(x=>x.k));}
function keysR(){return STAGE_R.flatMap(g=>g.items.map(i=>i.k)).concat(customR().map(x=>x.k));}
function keysAll(){return keysP().concat(keysR());}
function objProgress(o){const rows=o.rows||{};const ex=((o.extra&&o.extra.P)||[]).concat((o.extra&&o.extra.R)||[]).map(x=>x.k);const cur=o.curated;const inc=k=>cur?(rows[k]||{}).on===true:(rows[k]||{}).on!==false;const ks=ALLK.concat(ex).filter(inc);let d=0;ks.forEach(k=>{if((rows[k]||{}).st==='сдан')d++;});return{done:d,total:ks.length,pct:ks.length?Math.round(d/ks.length*100):0};}
function progressKeys(keys){const o=O();const ks=keys.filter(secIncluded);let done=0,started=0;ks.forEach(k=>{const st=(o.rows[k]||{}).st||'не начат';if(st==='сдан')done++;if(st!=='не начат')started++;});return{total:ks.length,done,started,pct:ks.length?Math.round(done/ks.length*100):0};}
function irdProgress(){const keys=IRD.flatMap(g=>g.items.map(i=>i.k)).concat(customI().map(x=>x.k)).filter(irdIncluded);let ready=0;keys.forEach(k=>{const st=irdStatus(k);if(st==='получено'||st==='не требуется')ready++;});return{total:keys.length,ready,pct:keys.length?Math.round(ready/keys.length*100):0};}
function blockedSections(){const set=new Set();Object.keys(IRD_DEPS).forEach(ik=>{if(!irdIncluded(ik))return;const ready=['получено','не требуется'].includes(irdStatus(ik));if(!ready)IRD_DEPS[ik].forEach(rk=>{if(!secIncluded(rk))return;if(((O().rows[rk]||{}).st||'не начат')!=='сдан')set.add(rk);});});return[...set];}
function plural(n,a,b,c){n=Math.abs(n)%100;const n1=n%10;if(n>10&&n<20)return c;if(n1>1&&n1<5)return b;if(n1===1)return a;return c;}
const todayD=()=>{const d=new Date();d.setHours(0,0,0,0);return d;};
function taskStats(o){const ts=objTasks(o);const open=ts.filter(t=>t.status!=='выполнена');const od=open.filter(t=>t.due&&new Date(t.due)<todayD());return{total:ts.length,open:open.length,overdue:od.length};}
function tasksForSec(k){return objTasks(O()).filter(t=>t.sec===k&&t.status!=='выполнена').length;}

/* гантт */
const DAY=86400000;const pdt=s=>s?new Date(s+'T00:00:00'):null;const fmtDM=d=>('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2);
const PRIO_COLOR={'низкий':'#b9bdc4','средний':'#5a8fd6','высокий':'#dd9c3e','критичный':'#d4685d'};
function ganttItems(){const o=O();const out=[];const push=(label,name,k)=>{if(!secIncluded(k)||!scopeAllows(k))return;const r=o.rows[k]||{};if(r.start&&r.end){const a=pdt(r.start),b=pdt(r.end);if(b>=a){const tk=objTasks(o).filter(t=>t.sec===k&&t.due&&t.status!=='выполнена');const qs=objTasks(o).filter(t=>t.sec===k&&t.status!=='выполнена');let cs=null,ce=null;if(r.custStart&&r.custEnd){const x=pdt(r.custStart),y=pdt(r.custEnd);if(y>=x){cs=x;ce=y;}}out.push({k,label,name,who:r.who||'',a,b,cs:cs,ce:ce,st:r.st||'не начат',tasks:tk,qs:qs});}}};STAGE_P.forEach(x=>push(x.n,x.t,x.k));customP().forEach(i=>push(i.label||'•',i.t||'(подраздел)',i.k));STAGE_R.forEach(g=>g.items.forEach(i=>push(i.m,i.t,i.k)));customR().forEach(i=>push(i.label||'•',i.t||'(подраздел)',i.k));return out;}
function renderGantt(){
  let items=ganttItems();
  const rangeBtns='<div class="grange">'+GANTT_RANGES.map(r=>'<button class="gr'+(ganttRange===r[0]?' on':'')+'" onclick="setGanttRange(\''+r[0]+'\')">'+r[1]+'</button>').join('')+'</div>';
  if(!items.length)return rangeBtns+'<div class="empty-note">Чтобы построить график, укажите <b>Начало</b> и <b>Окончание</b> у разделов на вкладках «Стадия П» и «Стадия Р».</div>';
  const today=todayD();let min,max;
  const rdef=GANTT_RANGES.find(r=>r[0]===ganttRange);
  if(ganttRange==='all'||!rdef||rdef[2]===0){min=items[0].a;max=items[0].b;items.forEach(it=>{if(it.a<min)min=it.a;if(it.b>max)max=it.b;if(it.cs&&it.cs<min)min=it.cs;if(it.ce&&it.ce>max)max=it.ce;});if(today<min)min=today;if(today>max)max=today;min=new Date(+min-3*DAY);max=new Date(+max+3*DAY);}
  else{const days=rdef[2];min=new Date(+today-Math.max(1,Math.round(days*0.12))*DAY);max=new Date(+today+days*DAY);}
  items=items.filter(it=>!(it.b<min||it.a>max));
  if(!items.length)return rangeBtns+'<div class="empty-note">В выбранном периоде нет разделов с датами. Попробуйте «Всё» или больший период.</div>';
  const span=Math.max(1,(max-min)/DAY);const pct=d=>((d-min)/DAY)/span*100;
  const stepDays=Math.max(7,Math.ceil(span/8/7)*7);
  let ticks='';for(let t=+min;t<=+max;t+=stepDays*DAY){const d=new Date(t);ticks+='<div class="gtick" style="left:'+pct(d)+'%">'+fmtDM(d)+'</div>';}
  const todayLine=(today>=min&&today<=max)?'<div class="gtoday" style="left:'+pct(today)+'%"><span>сегодня</span></div>':'';
  let rows='';
  items.forEach(it=>{let L=Math.max(0,pct(it.a)),R=Math.min(100,pct(it.b));const W=Math.max(1.5,R-L);const col=STAT_COLOR[it.st];const dl=Math.ceil((it.b-today)/DAY);let lb,lc;
    if(it.st==='сдан'){lb='сдан';lc='l-done';}else if(dl<0){lb='просрочено '+(-dl)+' дн';lc='l-late';}else if(dl<=7){lb='осталось '+dl+' дн';lc='l-soon';}else{lb='осталось '+dl+' дн';lc='l-ok';}
    let grid='';for(let t=+min;t<=+max;t+=stepDays*DAY){grid+='<div class="gridline" style="left:'+pct(new Date(t))+'%"></div>';}
    let pins='';(it.tasks||[]).forEach(tk=>{const d=pdt(tk.due);if(d>=min&&d<=max)pins+='<div class="gpin" style="left:'+pct(d)+'%;background:'+(FROM_COLOR[tk.from]||'#888780')+'" title="❓ '+esc(tk.title||'вопрос')+' · '+esc(tk.due)+(tk.from?' · от: '+esc(tk.from):'')+(tk.assignee?' · '+esc(userName(tk.assignee)):'')+'"></div>';});
    const qs=it.qs||[];
    const qhtml=qs.length?'<div class="gq-list">'+qs.slice(0,4).map(q=>{const od=q.due&&new Date(q.due)<today;return '<span class="gq '+PRIO_CLS[q.prio||'средний']+'" onclick="openTask(\''+it.k+'\')" title="'+esc(q.title||'вопрос')+(q.due?' · срок '+esc(q.due):'')+(q.assignee?' · '+esc(userName(q.assignee)):'')+'">❓ '+esc((q.title||'вопрос').slice(0,24))+(od?' ⚠':'')+'</span>';}).join('')+(qs.length>4?'<span class="gq-more" onclick="openTask(\''+it.k+'\')">+'+(qs.length-4)+' ещё</span>':'')+'</div>':'';
    let custBar='';if(it.cs&&it.ce&&!(it.ce<min||it.cs>max)){const cL=Math.max(0,pct(it.cs)),cR=Math.min(100,pct(it.ce));custBar='<div class="gbar-cust" style="left:'+cL+'%;width:'+Math.max(1.5,cR-cL)+'%" title="Срок заказчика · '+fmtDM(it.cs)+'–'+fmtDM(it.ce)+'">заказчик</div>';}
    rows+='<div class="grow"><div class="glabel"><div class="gl-name" title="'+esc(it.name)+'"><span class="gl-code">'+esc(it.label)+'</span>'+esc(it.name)+(needAttn(it.k)?'<span class="gl-attn" title="За пару дней до старта '+esc(attnText(it.k))+'">⚠ важно · '+esc(attnText(it.k))+'</span>':'')+'</div><div class="gl-meta"><span class="w">'+esc(it.who||'исполнитель не указан')+'</span><span class="gleft '+lc+'">'+lb+'</span></div>'+qhtml+'</div><div class="gtrack">'+grid+todayLine+'<div class="gbar" style="left:'+L+'%;width:'+W+'%;background:'+col+'" title="Подрядчик · '+esc(it.name)+' · '+fmtDM(it.a)+'–'+fmtDM(it.b)+'">'+esc(it.label)+'</div>'+custBar+pins+'</div></div>';});
  const legend='<div class="glegend"><span><i class="lg-pod"></i> срок подрядчика</span><span><i class="lg-cust"></i> срок заказчика</span><span><i class="lg-q"></i> вопрос (срок)</span></div>';
  return rangeBtns+legend+'<div class="gantt"><div class="gantt-head"><div class="gl">Раздел / исполнитель</div><div class="gl" style="position:relative;border:none"><div class="gaxis">'+ticks+todayLine+'</div></div></div>'+rows+'</div>';}

  // середина: разделы (только включённые) + кастомные
  let pBody=STAGE_P.filter(x=>secIncluded(x.k)&&scopeAllows(x.k)).map(x=>secNode(x.n,x.k)).join('')+customP().filter(i=>secIncluded(i.k)&&scopeAllows(i.k)).map(i=>secNode(i.label||'•',i.k)).join('')||'<span class="snmute">нет включённых разделов</span>';

  let iCust=customI().filter(i=>irdIncluded(i.k)).map(i=>({k:i.k,t:i.t||'ИРД',short:(i.t||'ИРД').slice(0,4)}));

function renderLK(){
  const mine=myTasks();const open=mine.filter(x=>x.t.status!=='выполнена');

  const overdue=work.filter(x=>x.t.due&&new Date(x.t.due)<today);
  const week=work.filter(x=>x.t.due&&new Date(x.t.due)>=today&&new Date(x.t.due)<=sun);

  if(review.length)html+='<div class="lkblock review"><div class="lkh">🔎 На вашу проверку — исполнитель отметил «решено»</div>'+review.map(x=>lkCard(x,'c-review')).join('')+'</div>';

  html+='<div class="lkblock"><div class="lkh">📅 На этой неделе ('+fmtDM(mon)+'–'+fmtDM(sun)+')</div>'+(week.length?week.map(x=>lkCard(x,'')).join(''):'<div class="empty-note">На этой неделе вопросов нет.</div>')+'</div>';
  if(later.length)html+='<div class="lkblock"><div class="lkh">Позже / без срока</div>'+later.map(x=>lkCard(x,'c-mute')).join('')+'</div>';
  if(!open.length)html+='<div class="empty-note">Вам пока не назначено вопросов и нет задач на проверку.</div>';
  html+='<div class="src">Цикл вопроса: исполнитель нажимает «Принял» → работает → «Решено → на проверку» → вопрос приходит сюда автору, который «Принимает» или «Возвращает на корректировку» с комментарием. Вся история — по кнопке 🕘. Уведомления по email/мессенджеру требуют серверной части — пока всё «приходит» в Личный кабинет.</div>';

}

function renderTasksGantt(list){
  const items=list.filter(x=>x.t.due).map(x=>{
    const t=x.t,o=x.o; const due=pdt(t.due);
    const created=t.created?pdt(t.created.length===10?t.created:t.due):null;
    let start=created&&created<=due?created:new Date(+due-2*DAY);
    return {t:t,o:o,a:start,b:due,name:(t.title||'(вопрос)'),label:(t.from||''),sub:(o?o.passport.name:'Бэкофис')+(t.sec?' · '+rowLabel(t.sec):''),st:t.status||'новая'};
  });
  if(!items.length)return '<div class="empty-note">Среди отобранных задач нет указанных сроков — Гантт строить не из чего.</div>';
  const today=todayD();let min=items[0].a,max=items[0].b;items.forEach(it=>{if(it.a<min)min=it.a;if(it.b>max)max=it.b;});if(today<min)min=today;if(today>max)max=today;min=new Date(+min-3*DAY);max=new Date(+max+3*DAY);
  const span=Math.max(1,(max-min)/DAY);const pct=d=>((d-min)/DAY)/span*100;const step=Math.max(7,Math.ceil(span/8/7)*7);
  let ticks='';for(let t=+min;t<=+max;t+=step*DAY){const d=new Date(t);ticks+='<div class="gtick" style="left:'+pct(d)+'%">'+fmtDM(d)+'</div>';}
  const todayLine=(today>=min&&today<=max)?'<div class="gtoday" style="left:'+pct(today)+'%"><span>сегодня</span></div>':'';
  let rows='';items.forEach(it=>{const L=Math.max(0,pct(it.a)),R=Math.min(100,pct(it.b));const W=Math.max(1.5,R-L);const col=FROM_COLOR[it.t.from]||'#888780';
    rows+='<div class="grow"><div class="glabel"><div class="gl-name" title="'+esc(it.name)+'">'+esc(it.name)+'</div><div class="gl-meta"><span class="w">'+esc(it.sub)+'</span></div></div><div class="gtrack">'+todayLine+'<div class="gbar" style="left:'+L+'%;width:'+W+'%;background:'+col+'" title="'+esc(it.t.from||'')+' · '+fmtDM(it.a)+'–'+fmtDM(it.b)+'">'+esc(it.t.from||'')+'</div></div></div>';});
  return '<div class="gantt"><div class="gantt-head"><div class="gl">Вопрос</div><div class="gl" style="position:relative;border:none"><div class="gaxis">'+ticks+todayLine+'</div></div></div>'+rows+'</div>';
}

function renderExecGantt(name){
  const asg=execAssignments(name).filter(a=>a.start&&a.end).map(a=>({a:pdt(a.start),b:pdt(a.end),o:a.o,k:a.k,st:a.st}));
  // задачи по исполнителю как assignee (есть user) или совпадение по имени
  const u=usersLive().find(x=>(x.name||x.login)===name);
  const tks=[];DB.objects.filter(o=>!o._del).forEach(o=>(o.tasks||[]).filter(t=>!t._del&&t.due&&t.status!=='выполнена').forEach(t=>{if((u&&t.assignee===u.id)||(!u&&(t.assignee||'').toString().toLowerCase()===name.toLowerCase())){const due=pdt(t.due);const start=t.created?pdt(t.created.length===10?t.created:t.due):new Date(+due-2*DAY);tks.push({a:start<=due?start:new Date(+due-2*DAY),b:due,t:t,o:o});}}));
  if(!asg.length&&!tks.length)return '<div class="empty-note" style="margin-top:10px">У «'+esc(name)+'» нет разделов и задач с проставленными датами — Гантт строить не из чего.</div>';
  const all=asg.map(x=>x).concat(tks.map(x=>({a:x.a,b:x.b})));
  let min=all[0].a,max=all[0].b;all.forEach(x=>{if(x.a<min)min=x.a;if(x.b>max)max=x.b;});const today=todayD();if(today<min)min=today;if(today>max)max=today;min=new Date(+min-3*DAY);max=new Date(+max+3*DAY);
  const span=Math.max(1,(max-min)/DAY);const pct=d=>((d-min)/DAY)/span*100;const step=Math.max(7,Math.ceil(span/8/7)*7);
  let ticks='';for(let t=+min;t<=+max;t+=step*DAY){const d=new Date(t);ticks+='<div class="gtick" style="left:'+pct(d)+'%">'+fmtDM(d)+'</div>';}
  const todayLine=(today>=min&&today<=max)?'<div class="gtoday" style="left:'+pct(today)+'%"><span>сегодня</span></div>':'';
  // накладки по разделам
  const conflicts=new Set();for(let i=0;i<asg.length;i++)for(let j=i+1;j<asg.length;j++)if(ovl(asg[i].a.toISOString().slice(0,10),asg[i].b.toISOString().slice(0,10),asg[j].a.toISOString().slice(0,10),asg[j].b.toISOString().slice(0,10))){conflicts.add(i);conflicts.add(j);}
  let rows='';
  asg.forEach((a,i)=>{const L=Math.max(0,pct(a.a)),R=Math.min(100,pct(a.b));const col=STAT_COLOR[a.st]||'#888780';const onm=(a.o.passport&&a.o.passport.name)||'объект';const conf=conflicts.has(i);
    rows+='<div class="grow"><div class="glabel"><div class="gl-name" title="'+esc(onm)+' · '+esc(labelOf(a.o,a.k))+'"><span class="gl-code">'+esc(labelOf(a.o,a.k))+'</span>'+esc(onm)+(conf?' <span class="gl-attn">⚠ накладка</span>':'')+'</div><div class="gl-meta"><span class="w">раздел · '+esc(a.st)+'</span></div></div><div class="gtrack">'+todayLine+'<div class="gbar" style="left:'+L+'%;width:'+Math.max(1.5,R-L)+'%;background:'+col+'" title="'+esc(onm)+' · '+esc(labelOf(a.o,a.k))+' · '+fmtDM(a.a)+'–'+fmtDM(a.b)+'">'+esc(labelOf(a.o,a.k))+'</div></div></div>';});
  tks.forEach(x=>{const L=Math.max(0,pct(x.a)),R=Math.min(100,pct(x.b));const col=FROM_COLOR[x.t.from]||'#888780';const onm=(x.o.passport&&x.o.passport.name)||'';
    rows+='<div class="grow"><div class="glabel"><div class="gl-name" title="'+esc(x.t.title||'')+'"><span class="gl-code" style="background:#faeeda;color:#854f0b">?</span>'+esc(x.t.title||'(вопрос)')+'</div><div class="gl-meta"><span class="w">'+esc(onm)+' · '+esc(x.t.from||'')+'</span></div></div><div class="gtrack">'+todayLine+'<div class="gbar" style="left:'+L+'%;width:'+Math.max(1.5,R-L)+'%;background:'+col+'" title="'+esc(x.t.title||'')+' · до '+fmtDM(x.b)+'">'+esc(x.t.from||'')+'</div></div></div>';});
  return '<div class="ptitle" style="margin:14px 4px 6px"><i>›</i><span>Загрузка: '+esc(name)+'</span><span style="margin-left:auto"><button class="btn sm" onclick="pickExec(\'\')">Закрыть</button></span></div>'+
    '<div class="gantt"><div class="gantt-head"><div class="gl">Раздел / вопрос</div><div class="gl" style="position:relative;border:none"><div class="gaxis">'+ticks+todayLine+'</div></div></div>'+rows+'</div>'+
    (conflicts.size?'<div class="src" style="color:var(--red);margin-top:8px">⚠ Найдены накладки по срокам — отмечены красной плашкой «⚠ накладка». Разнесите даты или передайте часть работы другому исполнителю.</div>':'');
}

  else if(view==='tasks'&&(currentUser.role==='admin'||currentUser.role==='director'||currentUser.role==='advisor'||currentUser.role==='rp'))html+=renderAllTasks();
  else if(view==='archive'&&currentUser.role==='admin')html+=renderArchive();
  else if(view==='object'&&O())html+=renderObject();
  else html+=renderPortfolio();
  html+='<div class="src">Каркас разделов — ПП РФ № 87 (ред. 21.10.2025). Марки РД — ГОСТ Р 21.101-2026. Данные команды синхронизируются через облако (Supabase).</div>';
  html+=execDatalist();
  document.getElementById('root').innerHTML=html;
}

/* ===================== INIT ===================== */
function init(){
  loadLocal();
  if(session.userId)currentUser=DB.users.find(u=>u.id===session.userId)||null;
  if(currentUser&&view==='login')view='portfolio';
  if(currentUser){if(!session.token)session.token=genToken();startHeartbeat();setTimeout(heartbeat,1500);}
  render();
  fetchRemote();
  setInterval(fetchRemote,60000);
}
init();
</script>
